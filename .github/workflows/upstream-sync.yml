---
name: Sync fork from upstream

# Keep this fork (vveerar1/Claude-Skills) current with its parent
# (alirezarezvani/claude-skills) by fast-forwarding the default branch.
# - Runs daily on a schedule, and on demand from the Actions tab.
# - Uses GitHub's native "merge-upstream" (no external action, no extra secrets).
# - If the fork has diverged (local commits that conflict), it fails loudly so
#   you resolve it manually instead of overwriting your work.

on:
  schedule:
    - cron: '0 6 * * *'          # daily at 06:00 UTC
  workflow_dispatch: {}          # manual run button

permissions:
  contents: write

concurrency:
  group: upstream-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Merge upstream into the default branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          branch="$(gh repo view "$GITHUB_REPOSITORY" --json defaultBranchRef -q .defaultBranchRef.name)"
          echo "Syncing $GITHUB_REPOSITORY:$branch from upstream (alirezarezvani/claude-skills)…"
          if gh api -X POST "repos/$GITHUB_REPOSITORY/merge-upstream" -f branch="$branch"; then
            echo "✅ Fork synced from upstream."
          else
            echo "::warning::merge-upstream failed — '$branch' has likely diverged from upstream (conflicts). Resolve manually, e.g. 'gh repo sync $GITHUB_REPOSITORY --source alirezarezvani/claude-skills'."
            exit 1
          fi
